name: 自动更新预测数据

on:
  schedule:
    - cron: '30 15 * * *'   # 北京时间 23:30
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 第一步：强制更新当前年份数据（即使失败也继续）
      - name: 尝试更新数据源
        continue-on-error: true
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'mark6')
          from shuju_loader import update_year_data
          print('正在更新 2026 年数据...')
          records = update_year_data(2026)
          print(f'2026 年记录数: {len(records)}')
          if records:
              print(f'最后五期: {[r[\"expect\"] for r in records[-5:]]}')
          "

      # 第二步：生成 V6 预测数据
      - name: 生成 V6 预测数据
        run: |
          python nv_4in1.py --output

      # 第三步：推送更新
      - name: 提交并推送更新
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add ensemble_data_v6.js mark6/2026.json
          if git diff --staged --quiet; then
            echo "没有文件变动"
          else
            git commit -m "自动更新预测数据 [skip ci]"
            git push origin HEAD
          fi
