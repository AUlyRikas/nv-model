name: 每日自动更新预测

on:
  schedule:
    - cron: '30 15 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 运行预测模型
        run: python nv_4in1.py --output

      - name: 更新时间戳到 nv.html
        run: |
          echo "<!-- updated: $(date -u) -->" >> nv.html

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ensemble_data_v6.js nv.html
          git diff --staged --quiet || git commit -m "自动更新预测数据"
          git push
