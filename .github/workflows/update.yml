name: 自动更新预测数据

on:
  schedule:
    # 北京时间每天 23:30 运行（UTC 15:30）
    - cron: '30 15 * * *'
  workflow_dispatch:   # 允许手动触发

permissions:
  contents: write      # 允许推送更新到仓库

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 运行 V6 预测并生成数据文件
        run: |
          python nv_4in1.py --output
        continue-on-error: false

      - name: 提交更新的数据文件
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add ensemble_data_v6.js mark6/2026.json
          git diff --staged --quiet || (git commit -m "自动更新预测数据 [skip ci]" && git push)
